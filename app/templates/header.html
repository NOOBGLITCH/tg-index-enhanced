<!doctype html>
<html data-theme="dark" lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <script>
        // Theme Management
        if (localStorage.theme === 'light' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches)) {
            document.documentElement.setAttribute('data-theme', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.theme = next;
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Outfit', sans-serif; }
        
        /* Highlighting Style */
        mark {
            background-color: #fde047; /* Bright Yellow */
            color: #000;
            border-radius: 2px;
            padding: 0 1px;
        }

        [data-theme="dark"] .light-icon { display: none; }
        [data-theme="dark"] .dark-icon { display: inline; }
        [data-theme="light"] .light-icon { display: inline; }
        [data-theme="light"] .dark-icon { display: none; }
    </style>

    <title>{% if title %} {{title}} {% else %} Telegram Index {% endif %}</title>
</head>

<body class="bg-base-200 text-base-content min-h-screen">

    <nav class="navbar bg-gradient-to-r from-primary to-secondary text-white shadow-lg sticky top-0 z-50">
        <div class="flex-1">
            <a href="/" class="btn btn-ghost text-xl font-bold">
                <i class="fab fa-telegram-plane text-2xl"></i>
                <span class="ml-2">Telegram Index</span>
            </a>
        </div>
        <div class="flex-none gap-2">
            <button onclick="toggleTheme()" class="btn btn-circle btn-ghost" title="Toggle Theme">
                <i class="material-icons-round text-2xl light-icon">light_mode</i>
                <i class="material-icons-round text-2xl dark-icon">dark_mode</i>
            </button>
            {% if authenticated %}
            <a href="/logout" class="btn btn-circle btn-error" title="Logout">
                <i class="material-icons-round">logout</i>
            </a>
            {% endif %}
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        
        <div class="max-w-2xl mx-auto mb-10">
            <div class="join w-full shadow-xl rounded-2xl border border-primary/20 overflow-hidden">
                <div class="join-item bg-base-100 flex items-center px-5">
                    <i class="material-icons-round text-primary">search</i>
                </div>
                <input 
                    type="text" 
                    id="liveSearch"
                    placeholder="Search files, movies, or documents..." 
                    class="input join-item w-full focus:outline-none bg-base-100 text-lg h-14"
                    autocomplete="off"
                />
            </div>
            <div id="searchStats" class="text-xs mt-2 opacity-50 px-2 flex justify-between">
                <span id="matchCount"></span>
            </div>
        </div>

        <div id="contentToSearch" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            {% for item in items %}
            <div class="card bg-base-100 shadow-sm border border-base-300 searchable-item transition-all hover:shadow-md">
                <div class="card-body">
                    <h2 class="card-title content-text">{{ item.title }}</h2>
                    <p class="content-text text-sm opacity-70">{{ item.description }}</p>
                    <div class="card-actions justify-end mt-4">
                        <a href="{{ item.link }}" class="btn btn-primary btn-sm">Download</a>
                    </div>
                </div>
            </div>
            {% endfor %}

        </div>
    </main>

    <script>
        const searchInput = document.getElementById('liveSearch');
        const matchDisplay = document.getElementById('matchCount');

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.trim().toLowerCase();
            const items = document.querySelectorAll('.searchable-item');
            let matches = 0;

            items.forEach((item) => {
                const textElements = item.querySelectorAll('.content-text');
                let hasMatch = false;

                textElements.forEach((el) => {
                    // Always pull from a data attribute or textContent to avoid nesting <mark> tags
                    if (!el.dataset.original) el.dataset.original = el.textContent;
                    const originalText = el.dataset.original;
                    
                    if (term === "") {
                        el.innerHTML = originalText;
                        hasMatch = true;
                    } else if (originalText.toLowerCase().includes(term)) {
                        const regex = new RegExp(`(${term})`, 'gi');
                        el.innerHTML = originalText.replace(regex, '<mark>$1</mark>');
                        hasMatch = true;
                    } else {
                        el.innerHTML = originalText;
                    }
                });

                if (hasMatch) {
                    item.style.display = "flex";
                    if (term !== "") matches++;
                } else {
                    item.style.display = "none";
                }
            });

            matchDisplay.innerText = term !== "" ? `Found ${matches} result(s)` : "";
        });
    </script>

</body>
</html>
