<!doctype html>
<html data-theme="dark" lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Telegram Channel Index - Browse and download media files">
	<meta name="theme-color" content="#6366f1">

	<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
	<link href="https://mini.allinonereborn.fun/jiotv-inn/app/assets/css/player.css" rel="stylesheet" type="text/css" />
	<script src="https://content.jwplatform.com/libraries/IDzF9Zmk.js"></script>

	<style>
		/* Netflix-inspired Player Theme */
		.jwplayer.jw-theme-netflix {
			--netflix-red: #E50914;
			--netflix-black: #141414;
			--netflix-dark: #181818;
			--netflix-gray: #808080;
			--netflix-white: #FFFFFF;
		}

		.jwplayer.jw-theme-netflix .jw-controlbar {
			background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%) !important;
		}

		.jwplayer.jw-theme-netflix .jw-progress {
			background: let(--netflix-red) !important;
			height: 4px !important;
		}

		.jwplayer.jw-theme-netflix .jw-rail {
			background: rgba(255,255,255,0.3) !important;
		}

		.jwplayer.jw-theme-netflix .jw-knob {
			background: let(--netflix-red) !important;
			width: 14px !important;
			height: 14px !important;
			border: 2px solid white !important;
		}

		.jwplayer.jw-theme-netflix .jw-button {
			color: white !important;
		}

		.jwplayer.jw-theme-netflix .jw-button:hover {
			color: let(--netflix-red) !important;
		}

		.jwplayer.jw-theme-netflix .jw-time {
			color: let(--netflix-gray) !important;
			font-family: 'Inter', sans-serif !important;
		}

		.jwplayer.jw-theme-netflix .jw-tooltip-time {
			background: let(--netflix-dark) !important;
			color: white !important;
		}

		.jwplayer.jw-theme-netflix .jw-menu {
			background: let(--netflix-dark) !important;
			border: 1px solid #333 !important;
		}

		.jwplayer.jw-theme-netflix .jw-menu-item {
			color: white !important;
		}

		.jwplayer.jw-theme-netflix .jw-menu-item:hover,
		.jwplayer.jw-theme-netflix .jw-menu-item.jw-active-option {
			background: let(--netflix-red) !important;
		}

		.jwplayer.jw-theme-netflix .jw-dock-button {
			background: rgba(0,0,0,0.6) !important;
		}

		.jwplayer.jw-theme-netflix .jw-dock-button:hover {
			background: let(--netflix-red) !important;
		}

		.jwplayer.jw-theme-netflix .jw-slider-horizontal:hover .jw-knob {
			transform: scale(1.2);
		}

		/* Netflix-style center play button */
		.jwplayer.jw-theme-netflix .jw-display-icon-container {
			background: rgba(0,0,0,0.7) !important;
			border-radius: 50% !important;
			transition: all 0.3s ease !important;
		}

		.jwplayer.jw-theme-netflix .jw-display-icon-container:hover {
			background: let(--netflix-red) !important;
			transform: scale(1.1);
		}

		/* Quality selector Netflix style */
		.jwplayer.jw-theme-netflix .jw-quality-menu {
			background: let(--netflix-dark) !important;
		}

		/* Logo styling */
		.jwplayer.jw-theme-netflix .jw-logo {
			top: 10px !important;
			right: 10px !important;
		}

		/* Fullscreen styling */
		.jwplayer.jw-theme-netflix.jw-fullscreen .jw-top {
			background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent) !important;
		}

		/* Buffering spinner */
		.jwplayer.jw-theme-netflix .jw-spinner {
			border: 3px solid rgba(255,255,255,0.3) !important;
			border-top-color: let(--netflix-red) !important;
		}

		/* Caption styling */
		.jwplayer.jw-theme-netflix .jw-captions {
			font-family: 'Inter', sans-serif !important;
			font-size: 1.1em !important;
			text-shadow: 2px 2px 2px rgba(0,0,0,0.8) !important;
		}

		/* Video player container Netflix style */
		.player-container-netflix {
			position: relative;
			background: #000;
			border-radius: 8px;
			overflow: hidden;
			box-shadow: 0 20px 60px rgba(0,0,0,0.8);
		}

		.player-container-netflix::before {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 4px;
			background: linear-gradient(90deg, let(--netflix-red) 0%, #ff6b6b 50%, let(--netflix-red) 100%);
			z-index: 10;
		}
	</style>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

	<style>
		* { font-family: 'Inter', system-ui, sans-serif; }
		.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

		:root {
			--transition-speed: 0.2s;
		}

		body {
			transition: background-color let(--transition-speed), color let(--transition-speed);
		}

		@keyframes fadeIn {
			from { opacity: 0; transform: translateY(10px); }
			to { opacity: 1; transform: translateY(0); }
		}

		@keyframes shimmer {
			0% { background-position: -200% 0; }
			100% { background-position: 200% 0; }
		}

		.animate-fade-in {
			animation: fadeIn 0.4s ease-out forwards;
		}

		.skeleton-loading {
			background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
			background-size: 200% 100%;
			animation: shimmer 1.5s infinite;
		}

		.card-hover {
			transition: transform 0.2s ease, box-shadow 0.2s ease;
		}

		.card-hover:hover {
			transform: translateY(-4px);
			box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.3);
		}

		.line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
		.line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
		.line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
	</style>

	<script>
		(function() {
			const theme = localStorage.theme ||
				(!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
			document.documentElement.setAttribute('data-theme', theme);
		})();
	</script>

	<title>{% if title %}{{ title | safe }}{% else %}Telegram Index{% endif %}</title>
</head>

<body class="bg-base-200 text-base-content min-h-screen flex flex-col">

<header class="sticky top-0 z-50 backdrop-blur-lg bg-base-200/80 border-b border-base-300">
	<div class="container mx-auto px-4">
		<div class="navbar min-h-16">
			<div class="navbar-start">
				<a href="/" class="flex items-center gap-3 text-xl font-bold hover:text-primary transition-colors">
					<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
						<span class="material-symbols-outlined text-white">send</span>
					</div>
					<span class="hidden sm:inline">Telegram Index</span>
				</a>
			</div>

			<div class="navbar-end gap-2">
				<button onclick="toggleTheme()" class="btn btn-ghost btn-circle" title="Toggle Theme" aria-label="Toggle theme">
					<svg class="w-5 h-5 light-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
					</svg>
					<svg class="w-5 h-5 dark-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
					</svg>
				</button>

				{% if authenticated %}
				<a href="/logout" class="btn btn-ghost btn-circle" title="Logout" aria-label="Logout">
					<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
					</svg>
				</a>
				{% endif %}
			</div>
		</div>
	</div>
</header>

<style>
	[data-theme="dark"] .light-icon { display: none; }
	[data-theme="dark"] .dark-icon { display: block; }
	[data-theme="light"] .light-icon { display: block; }
	[data-theme="light"] .dark-icon { display: none; }
</style>

<main class="flex-1 container mx-auto px-4 py-6">

<script>
	function toggleTheme() {
		const html = document.documentElement;
		const currentTheme = html.getAttribute('data-theme');
		const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
		html.setAttribute('data-theme', newTheme);
		localStorage.theme = newTheme;
	}
</script>
