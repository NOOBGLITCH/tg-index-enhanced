{% include 'header.html' %}

<div class="min-h-[80vh] flex items-center justify-center px-4">
	<div class="card bg-base-200 w-full max-w-md shadow-2xl">
		<div class="card-body">
			<div class="text-center mb-6">
				<i class="fas fa-lock text-5xl text-primary mb-4"></i>
				<h2 class="text-2xl font-bold">Sign in to view contents</h2>
				<p class="text-base-content/60 mt-2">Enter your credentials to continue</p>
			</div>

			{% if error %}
			<div class="alert alert-error mb-4">
				<i class="fas fa-exclamation-circle"></i>
				<span>{{ error }}</span>
			</div>
			{% endif %}

			<form class="space-y-4" action="/login" method="POST">
				<input type="hidden" name="remember" value="true">
				<input type="hidden" name="redirect_to" value="{{redirect_to}}">
				
				<div class="form-control">
					<label class="label" for="email-address">
						<span class="label-text font-semibold">
							<i class="fas fa-user mr-2"></i>Username
						</span>
					</label>
					<input id="email-address" 
						   name="username" 
						   type="text" 
						   required
						   class="input input-bordered focus:input-primary" 
						   placeholder="Enter your username">
				</div>

				<div class="form-control">
					<label class="label" for="password">
						<span class="label-text font-semibold">
							<i class="fas fa-key mr-2"></i>Password
						</span>
					</label>
					<input id="password" 
						   name="password" 
						   type="password" 
						   autocomplete="current-password" 
						   required
						   class="input input-bordered focus:input-primary" 
						   placeholder="Enter your password">
				</div>

				<div class="form-control mt-6">
					<button type="submit" class="btn btn-primary">
						<i class="fas fa-sign-in-alt mr-2"></i>
						Sign In
					</button>
				</div>
			</form>
		</div>
	</div>
</div>

{% include 'footer.html' %}
