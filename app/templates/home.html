{% include 'header.html' %}

<div class="hero py-12 bg-base-200 rounded-box">
	<div class="hero-content text-center">
		<div class="max-w-md">
			<h1 class="text-4xl font-bold bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
				<i class="fas fa-rss mr-2"></i>Available Sources
			</h1>
			<p class="py-4 text-base-content/70">
				Browse through your Telegram channels and groups
			</p>
		</div>
	</div>
</div>

<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 p-4">
	{% for chat in chats %}
	<a title="{{chat.name}}" href="/{{chat.page_id}}"
		class="card bg-base-100 shadow-xl hover:shadow-2xl hover:scale-105 transition-all duration-300 group">
		<figure class="px-4 pt-4">
			<img src="/{{chat.page_id}}/logo?big=1" 
				 alt="{{chat.name}}" 
				 class="w-20 h-20 rounded-full object-cover ring-4 ring-primary/30 group-hover:ring-primary transition-all">
		</figure>
		<div class="card-body items-center text-center p-4">
			<h2 class="card-title text-sm font-semibold line-clamp-2 group-hover:text-primary transition-colors">
				{{chat.name}}
			</h2>
		</div>
	</a>
	{% endfor %}
</div>

{% include 'footer.html' %}
